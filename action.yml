name: 'PR State Bug Hunter'
description: 'AI-powered analyzer to catch async race conditions, memory leaks, and React state bugs in PRs.'
author: 'cgseyhan'
inputs:
  github-token:
    description: 'The GITHUB_TOKEN or a custom GitHub Personal Access Token.'
    required: true
    default: '${{ github.token }}'
  gemini-api-key:
    description: 'API key for Gemini models to analyze detected async vulnerability spots.'
    required: false
  severity-threshold:
    description: 'Minimum severity of bugs to report on the PR (LOW, MEDIUM, HIGH).'
    required: false
    default: 'LOW'
  gemini-model:
    description: 'The specific Gemini model to use for analysis (e.g., gemini-1.5-flash, gemini-1.5-pro).'
    required: false
    default: 'gemini-1.5-flash'
  auto-comment:
    description: 'Whether the action should post inline and overview review comments on the PR.'
    required: false
    default: 'true'
  local-ai-base-url:
    description: 'Optional API base URL for Local AI (e.g. Ollama http://localhost:11434/v1 or LM Studio).'
    required: false
  local-model-name:
    description: 'Optional model name for Local AI (e.g. deepseek-coder, qwen2.5-coder).'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Cache PR State Bug Hunter Findings
      uses: actions/cache@v4
      with:
        path: .bug-hunter-cache.json
        key: bug-hunter-${{ github.repository }}-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          bug-hunter-${{ github.repository }}-${{ github.ref }}-
          bug-hunter-${{ github.repository }}-
    - name: Run PR State Bug Hunter
      run: node ${{ github.action_path }}/packages/core/src/index.js
      shell: bash
      env:
        INPUT_GITHUB-TOKEN: ${{ inputs.github-token }}
        INPUT_GEMINI-API-KEY: ${{ inputs.gemini-api-key }}
        INPUT_GEMINI-MODEL: ${{ inputs.gemini-model }}
        INPUT_SEVERITY-THRESHOLD: ${{ inputs.severity-threshold }}
        INPUT_AUTO-COMMENT: ${{ inputs.auto-comment }}
        INPUT_LOCAL-AI-BASE-URL: ${{ inputs.local-ai-base-url }}
        INPUT_LOCAL-MODEL-NAME: ${{ inputs.local-model-name }}
branding:
  icon: 'shield'
  color: 'blue'

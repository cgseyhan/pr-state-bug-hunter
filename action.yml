name: 'PR State Bug Hunter'
description: 'AI-powered analyzer to catch async race conditions, memory leaks, and React state bugs in PRs.'
author: 'Antigravity AI'
inputs:
  github-token:
    description: 'The GITHUB_TOKEN or a custom GitHub Personal Access Token.'
    required: true
    default: '${{ github.token }}'
  gemini-api-key:
    description: 'API key for Gemini models to analyze detected async vulnerability spots.'
    required: false
  severity-threshold:
    description: 'Minimum severity of bugs to report on the PR (LOW, MEDIUM, HIGH).'
    required: false
    default: 'LOW'
  auto-comment:
    description: 'Whether the action should post inline and overview review comments on the PR.'
    required: false
    default: 'true'
  local-ai-base-url:
    description: 'Optional API base URL for Local AI (e.g. Ollama http://localhost:11434/v1 or LM Studio).'
    required: false
  local-model-name:
    description: 'Optional model name for Local AI (e.g. deepseek-coder, qwen2.5-coder).'
    required: false
runs:
  using: 'node20'
  main: 'dist/index.js'
branding:
  icon: 'shield'
  color: 'blue'
